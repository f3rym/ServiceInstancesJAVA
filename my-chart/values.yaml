backend:
  image: f3rym/instance-services-backend
  tag: latest
  port: 8080
  livenessProbe:
    httpGet:
      path: /api/v1/instances
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/instances
      port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /api/v1/instances
      port: 8080
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 10
  resources:
    limits:
      cpu: 1
      memory: 1028Mi
    requests:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    name: backend
    port: 8080

db:
  image: postgres
  tag: 15
  replicas: 1
  port: 5432
  service:
    type: ClusterIP
    name: postgres-db
    port: 5432
  resources:
    requests:
      cpu: 125m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  credentials:
    secretName: postgres-credentials
  storageClass: local-path
  storage: 10Gi
  mountPath: /var/lib/postgresql/data


hpa:
  minReplicas: 1
  maxReplicas: 3
  cpu:
    target: 80
  memory:
    target: 80

frontend:
  image: f3rym/instance-services-frontend
  tag: latest
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  service:
    type: ClusterIP
    name: frontend
    port: 80

certificate:
  name: "letsencrypt-prod"
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: drakomishel@gmail.com
  solvers:
    type: http01
    ingressClass: nginx

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api-ferym.ddns.net
      paths:
        - path: /
          pathType: Prefix
          serviceName: backend
          port: 8080
  tls:
    - secretName: "api-ferym-site-tls"
      hosts:
        - api-ferym.ddns.net
